# ============================================================
# docker-compose.swarm.yml — PRODUÇÃO (Docker Swarm + Traefik)
# Stack AtomicaBR — rede AtomicaBRNet, certresolver letsencryptresolver
#
# Deploy via Portainer:
#   1. Abra Portainer → Stacks → Add Stack
#   2. Cole o conteúdo deste arquivo
#   3. Adicione as variáveis de ambiente:
#      MCP_TOKEN=<96 chars hex>
#      BRIDGE_SECRET=<64 chars hex>
#      CODE_SERVER_PASSWORD=<sua senha>
#   4. Clique em Deploy
#
# Pré-requisitos:
#   - Rede overlay AtomicaBRNet existente no Swarm
#   - Traefik rodando com certresolver=letsencryptresolver
#   - Domínios apontando para o servidor:
#       code.atomicabr.com.br → code-server (porta 8443)
#       mcp.atomicabr.com.br  → mcp-server  (porta 7337)
# ============================================================

version: '3.7'

services:

  # ── code-server (VS Code no browser) ──────────────────────────────────────
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /config/data/User
        printf '{"vscodeMcp.enable":true,"vscodeMcp.bridgeHost":"mcp-server","vscodeMcp.bridgePort":7100,"vscodeMcp.bridgeSecret":"%s","vscodeMcp.requireApproval":false,"vscodeMcp.logLevel":"info","editor.fontSize":14,"editor.tabSize":2,"workbench.colorTheme":"Default Dark Modern"}' "${BRIDGE_SECRET}" > /config/data/User/settings.json
        if [ -f /workspace/vscode-mcp-bridge-1.0.0.vsix ]; then
          echo "[entrypoint] Installing MCP Bridge extension..."
          /app/code-server/bin/code-server --install-extension /workspace/vscode-mcp-bridge-1.0.0.vsix --force 2>&1 || true
          echo "[entrypoint] Extension installed."
        fi
        exec /init
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - DEFAULT_WORKSPACE=/workspace
      - BRIDGE_SECRET=${BRIDGE_SECRET}
    volumes:
      - code-server-config:/config
      - workspace:/workspace
    networks:
      - AtomicaBRNet
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
      labels:
        - traefik.enable=true
        - traefik.docker.network=AtomicaBRNet
        - traefik.http.routers.code-server.rule=Host(`code.atomicabr.com.br`)
        - traefik.http.routers.code-server.entrypoints=websecure
        - traefik.http.routers.code-server.tls=true
        - traefik.http.routers.code-server.tls.certresolver=letsencryptresolver
        - traefik.http.services.code-server.loadbalancer.server.port=8443

  # ── MCP Server ────────────────────────────────────────────────────────────
  mcp-server:
    image: ghcr.io/adm01-debug/vscode-mcp-total-server:latest
    environment:
      - NODE_ENV=production
      - MCP_PORT=7337
      - MCP_HOST=0.0.0.0
      - BRIDGE_PORT=7100
      - BRIDGE_HOST=0.0.0.0
      - MCP_TOKEN=${MCP_TOKEN}
      - BRIDGE_SECRET=${BRIDGE_SECRET}
    volumes:
      - workspace:/workspace
    networks:
      - AtomicaBRNet
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
      labels:
        - traefik.enable=true
        - traefik.docker.network=AtomicaBRNet
        - traefik.http.routers.mcp-server.rule=Host(`mcp.atomicabr.com.br`)
        - traefik.http.routers.mcp-server.entrypoints=websecure
        - traefik.http.routers.mcp-server.tls=true
        - traefik.http.routers.mcp-server.tls.certresolver=letsencryptresolver
        - traefik.http.services.mcp-server.loadbalancer.server.port=7337
        # Rate limiting — 100 req/min por IP
        - traefik.http.middlewares.mcp-ratelimit.ratelimit.average=100
        - traefik.http.middlewares.mcp-ratelimit.ratelimit.burst=20
        - traefik.http.routers.mcp-server.middlewares=mcp-ratelimit

# ── Redes ──────────────────────────────────────────────────────────────────
networks:
  AtomicaBRNet:
    external: true
    name: AtomicaBRNet
  internal:
    driver: overlay

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  code-server-config:
  workspace:
