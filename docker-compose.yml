# ============================================================
# docker-compose.yml — DESENVOLVIMENTO / TESTE LOCAL
# Para subir localmente e testar antes de jogar no Swarm.
#
# Uso:
#   cp .env.example .env  # preencha os valores
#   docker compose up -d
#   docker compose logs -f
#
# Acesso:
#   code-server:  http://localhost:8443  (senha: CODE_SERVER_PASSWORD do .env)
#   MCP Server:   http://localhost:7337/ping
# ============================================================

services:

  # ── code-server (VS Code no browser) ──────────────────────
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - DEFAULT_WORKSPACE=/workspace
      - DOCKER_MODS=linuxserver/mods:code-server-extension-arguments
    volumes:
      - code-server-config:/config
      - workspace:/workspace
      - ./code-server/settings.json:/config/data/User/settings.json:ro
    ports:
      - "8443:8443"
    networks:
      - mcp-internal
    restart: unless-stopped
    depends_on:
      - mcp-server

  # ── MCP Server ─────────────────────────────────────────────
  mcp-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mcp-server
    environment:
      - NODE_ENV=production
      - MCP_PORT=7337
      - MCP_HOST=0.0.0.0
      - BRIDGE_PORT=7100
      - BRIDGE_HOST=0.0.0.0
      - MCP_TOKEN=${MCP_TOKEN}
      - BRIDGE_SECRET=${BRIDGE_SECRET}
    volumes:
      - workspace:/workspace
    ports:
      - "7337:7337"
    networks:
      - mcp-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7337/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  mcp-internal:
    driver: bridge

volumes:
  code-server-config:
  workspace:
